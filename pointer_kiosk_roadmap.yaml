  - docs/kiosk/field-install-checklist.md

milestones:
  - id: M0
    name: baseline_repo_and_branch
    goal_state: >-
      A safe development branch exists, current app still runs, and all baseline
      API/UI behavior is documented before kiosk changes begin.
    agent_tasks:
      - Create branch feature/kiosk-ux-port.
      - Run frontend build.
      - Run backend tests or at minimum start backend and hit /api/health.
      - Confirm /api/query response shape using a known query.
      - Document current routes and data shape in docs/kiosk/README.md.
    human_tasks:
      - Confirm which environment is the canonical staging deployment.
      - Confirm whether the current production site requires login or Cloudflare access.
      - Provide any secrets through environment manager, not chat or git.
    checks:
      - Frontend build succeeds.
      - Backend health endpoint returns ok.
      - Existing SMS webhook remains untouched.
      - No secret values are committed.
    exit_criteria:
      - docs/kiosk/README.md includes baseline architecture and run instructions.

  - id: M1
    name: six_inch_kiosk_ui_skeleton
    goal_state: >-
      /kiosk loads a full-screen 6-inch-friendly interface with no login screen,
      no desktop-style header, and a keypad-readable menu.
    agent_tasks:
      - Add /kiosk route without changing existing / route.
      - Build KioskShell with fixed regions: status, content, footer commands.
      - Add initial menu with 1-9 numbered actions and persistent 0/*/# hints.
      - Add CSS viewport profile for 6-inch landscape and portrait testing.
      - Add DemoKioskPage with simulated keypad for browser demos.
    human_tasks:
      - Choose target screen orientation for the first ATM install.
      - Measure actual visible screen resolution of the 6-inch display.
      - Decide final public-facing name: Pointer, TalkBox, Pointer Phone, etc.
    checks:
      - / works as before.
      - /kiosk works with keyboard only.
      - Text is readable at arm's length on a 6-inch display.
      - No scroll is required on the idle menu.
    exit_criteria:
      - A user can navigate the idle menu using only number keys, 0, *, and #.

  - id: M2
    name: keypad_state_machine
    goal_state: >-
      Kiosk navigation is controlled by a deterministic state machine that can be
      used by physical ATM keys, a browser keyboard, or demo buttons.
    agent_tasks:
      - Implement useKioskStateMachine.
      - Implement useKeypadInput.
      - Map keys 1-9, 0, *, # to state transitions.
      - Add screens: IDLE_MENU, QUERY_INPUT, RESULTS_LIST, RESOURCE_DETAIL, CALL_CONFIRM, CALL_ACTIVE, CLOSED, ERROR.
      - Add auto-reset timer after inactivity.
      - Add event logging stubs to /api/kiosk/events, even if backend initially no-ops.
    human_tasks:
      - Identify how ATM keypad outputs input: USB HID, GPIO, matrix, serial, or unknown.
      - If unknown, test keypad with a laptop and document what each key emits.
      - Decide whether green/red hardware buttons exist in v1 or whether #/0 act as call/back.
    checks:
      - Pressing 0 always returns to the previous safe screen or home.
      - Pressing * always repeats/help-prompts the current screen.
      - Pressing # never calls unless a resource has been selected and backend validates it.
      - Inactivity returns to IDLE_MENU.
    exit_criteria:
      - Full kiosk UX can be driven from a normal USB keyboard number row.

  - id: M3
    name: numbered_resource_results
    goal_state: >-
      Pointer query results are transformed into numbered, compact resource screens
      optimized for keypad selection rather than chat bubbles or card grids.
    agent_tasks:
      - Add /api/kiosk/query wrapper around existing QueryHandler.
      - Normalize results into display_items numbered 1-9.
      - Prefer one selected resource at a time on small screen.
      - Add RESULTS_LIST and RESOURCE_DETAIL views.
      - Preserve markdown fallback but do not render dense markdown in kiosk mode.
      - Add empty-state behavior that offers 211 and broad categories.
    human_tasks:
      - Identify the top 6 starting categories for the home screen.
      - Review whether 211 should appear as item 9, item 0, or persistent footer option.
      - Decide whether result randomization is acceptable for kiosk UX or whether ranking should be deterministic.
    checks:
      - Query for shelter returns numbered options.
      - Press 1 selects first resource.
      - Press 2 selects second resource.
      - Press 0 returns to results or home.
      - Long descriptions are truncated cleanly.
    exit_criteria:
      - A user can search, view 1-5 resources, select one, and return home using only number keys.

  - id: M4
    name: predefined_voice_actions
    goal_state: >-
      Speech input resolves to predefined actions or safe Pointer category queries,
      instead of uncontrolled natural-language commands.
    agent_tasks:
      - Add predefined_actions seed data.
      - Add backend action resolver service.
      - Implement /api/kiosk/action/resolve.
      - In frontend, capture browser speech transcript where available.
      - Send transcript to backend and receive action_code plus confidence.
      - Add low-confidence fallback: show top 3 options and ask user to press 1-3.
    human_tasks:
      - Record or write the exact voice prompts you want users to hear.
      - Approve the initial command vocabulary.
      - Decide whether voice input is push-to-talk, timed listening, or both.
      - Test microphone placement in the ATM shell before final mounting.
    checks:
      - Saying shelter routes to shelter query/action.
      - Saying repeat triggers repeat, not a search.
      - Saying call this one only works if a resource is selected.
      - Unknown speech does not dial or submit unsafe actions.
    exit_criteria:
      - Voice can operate menu, repeat, back, category search, and call confirmation safely.

  - id: M5
    name: text_to_speech_and_audio_feedback
    goal_state: >-
      The kiosk can read prompts and selected resources aloud, and can provide
      clear audio confirmation for navigation and errors.
    agent_tasks:
      - Add browser TTS helper with queue/cancel support.
      - Add repeat current screen command.
      - Add short spoken summaries for resource cards.
      - Add volume test page in /admin or /demo.
      - Ensure TTS does not overlap active calls.
    human_tasks:
      - Buy or temporarily install cheap powered speakers or USB speaker.
      - Test whether ATM shell muffles audio.
      - Decide if audio should default loud, medium, or adjustable by admin only.
    checks:
      - Pressing * repeats the current screen aloud.
      - Selecting a resource reads its name and short description.
      - Starting a call stops TTS.
      - Ending a call returns to normal audio prompts.
    exit_criteria:
      - A low-vision user can navigate core flow with keypad plus speech output.

  - id: M6
    name: twilio_voice_allowlisted_calling
    goal_state: >-
      The kiosk can place a speakerphone call to a selected allowlisted resource
      through Twilio Voice, with call status logs and no arbitrary dialing.
    agent_tasks:
      - Add resource_call_allowlist table and migration.
      - Add call_sessions table and migration.
      - Add Twilio Voice service wrapper.
      - Add /api/kiosk/call/token.
      - Add /api/kiosk/call/twiml.
      - Add /api/kiosk/call/status callback endpoint.
      - Add frontend useKioskVoiceCall hook.
      - Add CALL_CONFIRM and CALL_ACTIVE screens.
      - Add rate limits per kiosk and per session.
    human_tasks:
      - Create or configure Twilio Voice app.
      - Buy or assign Twilio phone number.
      - Decide caller ID behavior.
      - Confirm whether calls should ever be recorded. Recommended v1: no recording.
      - Approve initial callable resource numbers.
      - Write public signage: calls may be logged for operations; do not share sensitive info.
    checks:
      - Kiosk cannot dial a manually typed phone number.
      - Backend rejects non-allowlisted resource_id.
      - Twilio callback updates call status.
      - Red/0 hangs up or exits active call state.
      - Failed call returns user to selected resource with options.
    exit_criteria:
      - End-to-end call from /kiosk to one approved test number succeeds and is logged.

  - id: M7
    name: admin_portal_v1
    goal_state: >-
      Staff can manage kiosk devices, view call/event logs, and approve or suspend
      callable resource numbers from a web admin portal.
    agent_tasks:
      - Add /admin route guarded by existing auth.
      - Add device list and detail pages.
      - Add call logs table.
      - Add resource allowlist review table.
      - Add kiosk config editor for hours and feature flags.
      - Add basic export CSV for calls/events.
    human_tasks:
      - Decide who gets admin access.
      - Define operational statuses: testing, active, disabled, maintenance, retired.
      - Review provider-facing call policy.
      - Decide how often allowlist should be reviewed.
    checks:
      - Non-admin user cannot access /admin.
      - Admin can disable a kiosk.
      - Disabled kiosk cannot place calls.
      - Admin can suspend a resource number.
      - Suspended number cannot be called from kiosk.
    exit_criteria:
      - One machine can be remotely disabled and re-enabled from admin UI.

  - id: M8
    name: public_demo_mode
    goal_state: >-
      The kiosk UX can be demonstrated from any normal browser without special
      hardware, while real calling remains restricted.
    agent_tasks:
      - Add /demo route using same kiosk components.
      - Add simulated keypad component.
      - Add demo-only fake call mode unless authenticated/authorized.
      - Add shareable demo URL.
      - Add visual badge: DEMO MODE, NOT A LIVE PUBLIC KIOSK.
    human_tasks:
      - Decide whether public demo should show real provider phone numbers.
      - Decide whether demo calls go to a test number only.
      - Prepare a 60-second walkthrough script for funders and partners.
    checks:
      - Demo loads on desktop and phone.
      - Demo does not require physical keypad.
      - Demo cannot abuse outbound calling.
      - Kiosk and demo share core components.
    exit_criteria:
      - A funder can open a URL and understand the product in under one minute.

  - id: M9
    name: raspberry_pi_kiosk_bringup
    goal_state: >-
      A Raspberry Pi boots directly into the kiosk route, accepts keypad input,
      uses mic/speaker, and recovers from browser crashes.
    agent_tasks:
      - Add docs/kiosk/hardware-bringup.md.
      - Add sample systemd service or labwc autostart file for Chromium kiosk.
      - Add health check page for mic, speaker, keypad, network, and backend reachability.
      - Add heartbeat payload fields for hardware status.
    human_tasks:
      - Acquire Raspberry Pi 5 or equivalent mini PC.
      - Acquire official-quality power supply.
      - Acquire microSD or SSD.
      - Acquire USB mic or USB conference speakerphone.
      - Acquire cheap powered speakers if using standalone mic.
      - Test ATM keypad output.
      - Decide whether to use USB encoder or GPIO wiring for buttons.
      - Install plexiglass screen protection.
      - Confirm conduit power is safe and code-compliant with site owner/electrician.
    checks:
      - Device boots to /kiosk without keyboard/mouse.
      - Browser restarts if killed.
      - Network loss shows offline screen.
      - Network return restores kiosk without manual intervention.
      - Keypad works through plexiglass/ATM panel.
    exit_criteria:
      - Prototype can run unattended for 24 hours indoors.

  - id: M10
    name: field_hardening_v1
    goal_state: >-
      The kiosk is safe enough for a limited public pilot with remote monitoring,
      physical durability basics, closed-hours behavior, and abuse limits.
    agent_tasks:
      - Add closed-hours screen and config.
      - Add per-device and per-destination rate limits.
      - Add watchdog documentation.
      - Add tamper/offline event types.
      - Add privacy-preserving log retention config.
      - Add admin visible device heartbeat status.
    human_tasks:
      - Create installation agreement with property owner.
      - Mount hardware securely.
      - Add weather and vandal resistance appropriate to location.
      - Add public signage and instructions.
      - Confirm local policy for 211, crisis lines, and emergency instructions.
      - Decide pilot hours.
      - Create provider contact sheet for complaints or wrong numbers.
    checks:
      - Kiosk obeys configured hours.
      - 211 or emergency instruction remains visible when closed if configured.
      - Repeated call attempts are rate-limited.
      - Admin can see whether device is online.
      - Logs avoid unnecessary sensitive user content.
    exit_criteria:
      - Ready for supervised public pilot.

  - id: M11
    name: mailbox_pin_future_design
    goal_state: >-
      A future PIN-based message pickup feature is designed but not forced into v1.
    agent_tasks:
      - Create docs/kiosk/mailbox-future.md.
      - Draft mailbox schema but do not enable unless approved.
      - Define privacy, expiration, and abuse controls.
      - Add feature flag placeholder: mailbox_enabled=false.
    human_tasks:
      - Decide whether users can receive callbacks/messages through Pointer.
      - Decide PIN length and expiration policy.
      - Consult privacy/legal advisor before storing voice messages.
      - Talk to providers about whether they would use callback mailboxes.
    checks:
      - No mailbox routes are publicly active by accident.
      - Feature flag defaults to disabled.
      - Design doc explains risks and controls.
    exit_criteria:
      - Future mailbox feature is planned without delaying kiosk calling MVP.

  - id: M12
    name: mesh_and_solar_outpost_future_design
    goal_state: >-
      The codebase leaves room for LoRa/Meshtastic-style outposts without confusing
      them with full internet voice kiosks.
    agent_tasks:
      - Create docs/kiosk/mesh-outpost-future.md.
      - Define device class FULL_KIOSK vs LOW_POWER_OUTPOST.
      - Add placeholder device_class field to kiosk_devices.
      - Define tiny telemetry payload shape for future low-power devices.
    human_tasks:
      - Decide whether the first outpost experiment is telemetry-only or message relay.
      - Avoid promising live voice over LoRa.
      - Identify safe locations for solar testing.
    checks:
      - Current kiosk does not depend on mesh features.
      - Future fields are optional and harmless.
    exit_criteria:
      - Architecture supports future outposts without bloating MVP.

human_global_checklist:
  hardware:
    - Get the old ATM shell dimensions and photos.
    - Identify exact keypad wiring/output.
    - Decide whether to preserve existing ATM buttons or replace with USB arcade encoder.
    - Buy Raspberry Pi 5 or small fanless mini PC.
    - Buy USB mic or USB conference speakerphone.
    - Buy cheap powered speaker if needed.
    - Buy quality power supply and surge protection.
    - Protect screen with plexiglass or polycarbonate.
    - Plan ventilation and water resistance.
  service_and_ops:
    - Create Twilio Voice configuration.
    - Keep Twilio SMS working as a separate channel.
    - Decide which numbers are allowlisted.
    - Contact critical providers and tell them about the pilot.
    - Decide hours of operation.
    - Create signage and privacy language.
    - Decide who monitors call failures and device outages.
    - Set a weekly allowlist review process.
  site_installation:
    - Confirm written permission from property owner.
    - Confirm conduit/power routing with qualified person.
    - Confirm hotspot placement and signal quality.
    - Confirm physical mounting and anti-theft plan.
    - Confirm maintenance access.
  safety_and_privacy:
    - Do not record calls in v1 unless explicitly reviewed.
    - Do not collect names unless absolutely needed.
    - Log call metadata, not sensitive conversation content.
    - Make emergency behavior explicit and legally reviewed before enabling 911.

technical_goal_states:
  mvp_done:
    - /kiosk route works on 6-inch screen.
    - Keypad-only navigation works.
    - Query returns numbered resources.
    - 0 goes back/home.
    - '*' repeats/help-prompts.
    - '#' or green initiates validated call.
    - Twilio call to allowlisted test number works.
    - Call status is logged.
    - Admin can disable kiosk and suspend numbers.
    - /demo route can be shared with partners.
  pilot_ready:
    - Device boots directly to kiosk.
    - Device recovers from browser crash.
    - Device sends heartbeat.
    - Closed-hours mode works.
    - Rate limits work.
    - Signage is installed.
    - Provider allowlist reviewed.
    - 24-hour unattended test passes.

recommended_first_build_order:
  - M0
  - M1
  - M2
  - M3
  - M8
  - M4
  - M5
  - M6
  - M7
  - M9
  - M10
  - M11
  - M12

non_goals_for_v1:
  - arbitrary outbound dialing
  - video calls
  - facial recognition
  - call recording
  - storing sensitive identity data
  - offline full Pointer search
  - live voice over LoRa
  - complex touch UI
  - full mailbox system before the basic call kiosk works

acceptance_test_script_mvp: |
  1. Open /demo on a normal laptop.
  2. Press 1 for Shelter or type/speak "I need shelter tonight".
  3. Confirm numbered resources appear.
  4. Press 1 to select the first resource.
  5. Press * and confirm the resource is repeated aloud.
  6. Press 0 and confirm it returns to the list.
  7. Select a test resource with allowlisted phone number.
  8. Press # or green and confirm call confirmation screen appears.
  9. Confirm backend refuses calls if resource is not allowlisted.
  10. Complete one Twilio test call and confirm call log appears in admin.
  11. Disable the kiosk from admin and confirm calls are blocked.
  12. Re-enable kiosk and confirm normal flow works again.
