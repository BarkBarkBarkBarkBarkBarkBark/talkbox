    kiosk_sessions:
      fields:
        - id
        - kiosk_id
        - started_at
        - ended_at
        - reset_reason
        - language
        - last_state
    kiosk_events:
      fields:
        - id
        - kiosk_id
        - session_id
        - event_type
        - event_payload_json
        - created_at
    resource_call_allowlist:
      fields:
        - id
        - resource_type
        - resource_id
        - normalized_phone
        - label
        - status
        - approved_by
        - notes
        - created_at
        - updated_at
    call_sessions:
      fields:
        - id
        - kiosk_id
        - kiosk_session_id
        - resource_type
        - resource_id
        - normalized_destination_phone
        - twilio_call_sid
        - status
        - started_at
        - ended_at
        - duration_seconds
        - failure_reason
        - created_at
        - updated_at
    predefined_actions:
      fields:
