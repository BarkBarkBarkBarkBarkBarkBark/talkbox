roadmap_name: pointer_kiosk_ux_port
version: 0.1.0
created_for: Pointer / TalkBox kiosk network
primary_goal: >-
  Port the existing Pointer web app into a keypad-first, voice-assisted kiosk UX
  for a 6-inch screen, where a user can ask for help, receive numbered resource
  results, select a resource with ATM number keys, and call only allowlisted numbers.

agent_prompt: |
  You are the implementation agent for the Pointer Kiosk UX port.

  Your job is to convert the existing Pointer app into a public-service kiosk
  interface without breaking the current web demo or admin workflows.

  Work in small, reviewable phases. For every phase:
  1. Inspect the existing repo before modifying files.
  2. Preserve the existing /api/query behavior unless the phase explicitly changes it.
  3. Prefer additive routes, components, and endpoints over risky rewrites.
  4. Keep the kiosk UI usable on a 6-inch screen with only number keys.
  5. Treat the Raspberry Pi as a thin API/browser terminal, not as the source of truth.
  6. Never allow arbitrary dialing from the kiosk. Calls must go through backend validation.
  7. Make the normal web frontend usable from anywhere as a public demo, while the kiosk
     route uses device identity, rate limits, and locked-down controls.
  8. Include tests or manual verification steps before moving to the next phase.
  9. Leave clear notes in docs/kiosk/ after every completed milestone.

  The ideal UX is extremely simple:
  - User walks up.
  - Screen shows a short menu and always-visible controls.
  - User speaks or types what they need.
  - Pointer returns numbered resources.
  - User presses a number to select.
  - User presses green or # to call.
  - User presses red or 0 to go back/hang up.

  Optimize for reliability, abuse resistance, accessibility, and field maintainability.

source_context:
  existing_backend:
    framework: FastAPI
    current_public_endpoints:
      - GET /api/health
      - POST /api/sms-query
      - POST /api/auth/register
      - POST /api/auth/jwt/login
      - POST /api/auth/jwt/logout
    current_authenticated_endpoints:
      - POST /api/query
      - GET /api/users/me
      - PATCH /api/users/me
    existing_query_response_shape:
      markdown: string
      results:
        type: agencies | doctors
        category: string | null
        items_agencies:
          - name: string
            phone: string | null
            address: string | null
            description: string | null
            insurance: string | null
            tags: string | null
        items_doctors:
          - first_name: string | null
            last_name: string | null
            phone: string | null
            specialty: string | null
            address: string | null
            insurance: string | null
            transportation_provider: string | null
            transportation_phone: string | null
  existing_frontend:
    framework: React + Vite
    current_main_route: /
    current_query_client: frontend/src/lib/api.js
    current_chat_hook: frontend/src/hooks/useChat.js
    current_result_cards: frontend/src/components/ResultCards.jsx
  existing_twilio:
    implemented_now:
      - SMS webhook receives Body and From
      - asynchronous SMS response uses existing query handler
    desired_next:
      - Twilio Voice browser calling
      - backend-validated allowlisted calls
      - call status callbacks and logs

product_principles:
  - keypad_first_not_touchscreen_first
  - six_inch_screen_single_focus_layout
  - voice_assisted_but_not_voice_dependent
  - cloud_source_of_truth
  - pi_as_thin_kiosk_terminal
  - no_arbitrary_dialing
  - public_demo_and_kiosk_mode_share_components
  - admin_configures_behavior_without_redeploying
  - every_machine_has_device_identity
  - every_call_has_a_traceable_session_id
  - emergency_features_are_separate_and_deliberate

ux_constraints:
  screen:
    size: 6 inch
    layout_rule: show one primary thing at a time
    avoid:
      - dense card grids
      - tiny buttons
      - scroll-heavy chat transcripts
      - normal desktop header chrome
  input:
    required_initial_controls:
      - 12_key_atm_keypad
    key_mapping_v1:
      key_1_to_9: select visible menu item or resource number
      key_0: back_or_home
      key_star: repeat_or_help
      key_hash: call_selected_resource_or_submit
    optional_extra_buttons:
      green: call_or_confirm
      red: hang_up_cancel_or_back
      yellow: repeat_current_screen
      blue: start_voice_input
  audio:
    recommended_first_hardware:
      mic: basic USB microphone or USB conference speakerphone
      speaker: cheap powered speaker or USB speaker
      camera: avoid in v1 unless needed for microphone only
    reason: >-
      A webcam adds privacy and signage complexity. Audio-only is simpler,
      cheaper, and less intimidating for a public homelessness-service kiosk.

voice_commands:
  design: predefined_actions_resolved_by_stt_then_embedding_similarity
  always_available_commands:
    - phrase: help
      action: HELP
    - phrase: repeat
      action: REPEAT_SCREEN
    - phrase: go back
      action: BACK
    - phrase: start over
      action: HOME
    - phrase: call this one
      action: CALL_SELECTED
    - phrase: hang up
      action: HANG_UP
    - phrase: next
      action: NEXT_ITEM
    - phrase: previous
      action: PREVIOUS_ITEM
    - phrase: shelter
      action: QUICK_QUERY_SHELTER
    - phrase: food
      action: QUICK_QUERY_FOOD
    - phrase: doctor
      action: QUICK_QUERY_MEDICAL
    - phrase: mental health
      action: QUICK_QUERY_MENTAL_HEALTH
    - phrase: transportation
      action: QUICK_QUERY_TRANSPORT
    - phrase: call two one one
      action: CALL_211
  implementation_rule: >-
    Voice should never directly dial a number. Voice resolves to an action,
    and the backend validates whether that action is allowed in the current state.

architecture:
  deployment_shape:
    cloud:
      - pointer_frontend
      - pointer_backend
      - postgres_pgvector
      - twilio_voice_and_sms
      - admin_portal
      - logs_and_monitoring
    kiosk_device:
      - raspberry_pi_or_mini_pc
      - chromium_kiosk_browser
      - keypad_or_usb_encoder
      - microphone
      - speaker
      - optional_watchdog_service
  modes:
    web_demo:
      route: /demo
      auth: optional_or_demo_session
      features:
        - typed_query
        - simulated_keypad
        - microphone_if_browser_allows
        - simulated_call_flow_or_real_allowlisted_call_if_authorized
    kiosk:
      route: /kiosk
      auth: device_token_or_signed_device_session
      features:
        - keypad_only_navigation
        - voice_input
        - text_to_speech
        - allowlisted_calls
        - closed_hours_rules
        - auto_reset
    admin:
      route: /admin
      auth: staff_login_required
      features:
        - manage_kiosks
        - manage_resource_allowlist
        - view_call_logs
        - set_hours
        - configure_voice_commands
        - review_device_health

backend_new_endpoints:
  kiosk:
    - method: GET
      path: /api/kiosk/config
      purpose: return device-specific menu, hours, emergency policy, and feature flags
    - method: POST
      path: /api/kiosk/session
      purpose: create anonymous kiosk session for analytics and rate limiting
    - method: POST
      path: /api/kiosk/query
      purpose: run Pointer query and return numbered, display-safe resources
    - method: POST
      path: /api/kiosk/action/resolve
      purpose: map text or speech transcript to predefined action
    - method: POST
      path: /api/kiosk/call/token
      purpose: issue short-lived Twilio Voice token for a validated resource selection
    - method: POST
      path: /api/kiosk/call/twiml
      purpose: return TwiML Dial only for approved call sessions
    - method: POST
      path: /api/kiosk/call/status
      purpose: receive Twilio call lifecycle callbacks
    - method: POST
      path: /api/kiosk/events
      purpose: record button presses, state transitions, failures, and resets
    - method: POST
      path: /api/kiosk/heartbeat
      purpose: record device uptime, app version, network status, and peripheral status
  admin:
    - method: GET
      path: /api/admin/kiosks
      purpose: list devices and health
    - method: POST
      path: /api/admin/kiosks
      purpose: register a kiosk device
    - method: PATCH
      path: /api/admin/kiosks/{kiosk_id}
      purpose: update location, hours, status, feature flags, and notes
    - method: GET
      path: /api/admin/calls
      purpose: view call logs and outcomes
    - method: GET
      path: /api/admin/resources/allowlist
      purpose: review callable resources
    - method: PATCH
      path: /api/admin/resources/{resource_id}/allowlist
      purpose: approve, suspend, or annotate a callable number

