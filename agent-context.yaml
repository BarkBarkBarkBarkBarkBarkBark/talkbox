  pi_scripts:
    twilio_sync: /home/operator/talkbox/twilio-sync.sh               # runs on boot via systemd
    twilio_sync_service: /etc/systemd/system/twilio-sync.service
    kiosk_autostart: /home/operator/.config/autostart/kiosk.desktop    # opens Chromium at login

