project:
  name: TalkBox
  description: >
    Touchscreen social-services kiosk running on a Raspberry Pi 5 (2 GB RAM).
    Users type or speak a need ("I need shelter"), the system queries a pgvector
    database of local agencies, and displays results with one-touch calling.
    Calls are real two-way voice (Twilio Browser Voice SDK) — the Pi's browser
    acts as a soft-phone. Target users are unhoused/vulnerable individuals at a
    kiosk in a nonprofit or social-services facility.
  repo: https://github.com/BarkBarkBarkBarkBarkBarkBark/talkbox.git
  branch: main
  local_path_windows: C:\Users\MarcoDelFava\PycharmProjects\PythonProject\talkbox
  local_path_pi: /home/operator/talkbox

################################################################################
# INFRASTRUCTURE
################################################################################

infrastructure:
  pi:
    model: Raspberry Pi 5 (2 GB RAM)
    os: Raspberry Pi OS Lite (Bookworm / Debian 12 aarch64)
    hostname: hosaka
    user: operator
    password: neuro
    ssh: ssh operator@hosaka
    display: >
      LXDE desktop via raspberrypi-ui-mods. Autologin via raspi-config B4.
      Chromium opens at boot via ~/.config/autostart/kiosk.desktop.
    kiosk_url: http://localhost:8084/kiosk
    audio: USB microphone required for two-way calls (plugged into Pi USB port)

  docker:
    compose_file: /home/operator/talkbox/pointer-fork/docker-compose.yml
    root_compose: /home/operator/talkbox/docker-compose.yml  # uses `include:` + name: pointer-fork
    containers:
      pointer-postgres:
        image: pgvector/pgvector:pg18
        role: Postgres 18 with pgvector extension (vector similarity search)
        data_volume: postgres-data (persisted across rebuilds)
        network: pointer-network (internal only, no exposed port)
      pointer-backend:
        image: built from pointer-fork/backend/
        role: FastAPI Python 3.13 (Alpine), runs migrations + seeds on boot
        port: "127.0.0.1:8085 -> container:8000"
        entrypoint: pointer-fork/backend/docker-entrypoint.sh
        note: runs `python main.py seed` (alembic migrations + pgvector seed + admin seed) then uvicorn
      pointer-frontend:
        image: built from pointer-fork/frontend/
        role: React 19 + Vite, served via nginx
        port: "0.0.0.0:8084 -> container:80"
        note: nginx also reverse-proxies /api/* to pointer-backend:8000

  rebuild_commands:
    frontend_only: |
      cd /home/operator/talkbox/pointer-fork
      docker compose up -d --build pointer-frontend
    backend_only: |
      cd /home/operator/talkbox/pointer-fork
      docker compose up -d --build pointer-backend
    full_rebuild: |
      cd /home/operator/talkbox/pointer-fork
      docker compose up -d --build
    pull_and_rebuild: |
      cd /home/operator/talkbox
      git fetch origin && git reset --hard origin/main
      cd pointer-fork
      docker compose up -d --build pointer-backend pointer-frontend
    view_logs: |
      docker logs pointer-backend -f
      docker logs pointer-frontend -f
    health_check: |
      curl -fsS http://localhost:8085/api/health
      curl -fsS http://localhost:8084/ -o /dev/null -w 'HTTP %{http_code}'

