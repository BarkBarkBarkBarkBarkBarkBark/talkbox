################################################################################
# ARCHITECTURE — CALL FLOW
################################################################################

call_flow:
  description: >
    Two-way browser Voice SDK call. The Pi browser acts as a Twilio soft-phone.
    No PSTN trunk required on the kiosk — Twilio bridges browser ↔ PSTN.

  sequence:
    1_user_dials: User enters a number on the keypad or selects an agency from results.
    2_allowlist_check: >
      Frontend POSTs to /api/kiosk/call/token with {phone, name}.
      Backend normalizes number, checks agencies DB + KIOSK_TEST_CALL_NUMBERS.
      Returns 403 if not allowlisted.
    3_token_issued: >
      Backend generates a 90-second Twilio Voice JWT (AccessToken + VoiceGrant)
      with outgoing_application_sid=TWILIO_TWIML_APP_SID.
      Stores pending call in in-memory dict: {identity -> {to, agency, expires}}.
      Returns {token, identity, agency}.
    4_browser_connects: >
      Frontend useKioskVoiceCall hook initialises Twilio Device with the token,
      calls device.register() then device.connect({params: {identity}}).
    5_twilio_webhooks: >
      Twilio POSTs to TWILIO_PUBLIC_URL/api/kiosk/call/twiml.
      Backend looks up identity in pending dict, returns <Dial><Number>to</Number></Dial>.
      Twilio bridges the browser audio to the PSTN number.
    6_status_callbacks: >
      Twilio POSTs lifecycle events to /api/kiosk/call/status (logged, not acted on yet).
    7_hang_up: >
      User presses red "End call" button → connection.disconnect() → device.destroy().
      UI transitions back to results screen.

  key_files:
    backend_token_endpoint: pointer-fork/backend/src/presentation/kiosk_routes.py  # POST /api/kiosk/call/token
    backend_twiml_endpoint: pointer-fork/backend/src/presentation/kiosk_routes.py  # POST /api/kiosk/call/twiml
    backend_voice_service: pointer-fork/backend/src/infrastructure/voice/twilio_voice_service.py
    backend_allowlist: pointer-fork/backend/src/application/services/kiosk_call_service.py
    frontend_hook: pointer-fork/frontend/src/hooks/useKioskVoiceCall.js
    frontend_state_machine: pointer-fork/frontend/src/hooks/useKioskStateMachine.js
    frontend_call_screen: pointer-fork/frontend/src/components/kiosk/KioskCallScreen.jsx

  known_limitation: >
    TWILIO_PUBLIC_URL changes on every Pi reboot (free ephemeral tunnel plan = random URL).
    twilio-sync.sh (systemd service) handles this automatically:
    starts Tailscale Funnel, waits for URL, PATCHes TwiML App via Twilio REST API,
    rewrites .env, restarts pointer-backend container.

################################################################################
# NGROK + SYSTEMD
################################################################################

Tailscale Funnel:
  binary: /usr/local/bin/Tailscale Funnel
  config: /home/operator/.config/Tailscale Funnel/Tailscale Funnel.yml  # contains authtoken
  log: /tmp/Tailscale Funnel.log
  api_url: http://N/A        # local API to read current URL

  systemd_service: /etc/systemd/system/twilio-sync.service
  service_script: /home/operator/talkbox/twilio-sync.sh
  service_status: |
    sudo systemctl status twilio-sync.service
    journalctl -u twilio-sync.service -f

  update_script_steps:
    1: N/A
    2: N/A
    3: poll N/A until URL appears (up to 30s)
    4: >
      curl -X POST https://api.twilio.com/2010-04-01/Accounts/{SID}/Applications/{APP_SID}.json
        -u {SID}:{TOKEN} --data-urlencode "VoiceUrl={NGROK_URL}/api/kiosk/call/twiml"
    5: sed -i TWILIO_PUBLIC_URL= in .env
    6: docker compose restart pointer-backend

  production_alternative: >
    Buy Tailscale Funnel static domain (~$10/mo) → set TWILIO_PUBLIC_URL to fixed domain →
    delete twilio-sync.sh systemd service. Much simpler.

################################################################################
# HARDENING TODO — DevOps handoff
################################################################################

hardening_todo:
  priority_critical:
    - id: SEC-01
      title: Rotate JWT_SECRET
      detail: >
        Currently "change-me-in-production" in .env.
        Generate: openssl rand -hex 32
        Update pointer-fork/.env on Pi, then docker compose restart pointer-backend.

    - id: SEC-02
      title: Change ADMIN_PASSWORD
      detail: >
        Currently "admin". Change in .env + restart backend.
        The admin account is seeded once at boot by src/infrastructure/seed_admin.py.
        Changing the .env value alone won't update an already-seeded account —
        you must also update it in the DB:
        docker exec -it pointer-backend python -c "
        from src.infrastructure.database import get_db_connection; ..."
        Or: docker compose down -v (drops DB) then up --build (re-seeds with new password).
        WARNING: dropping volumes also wipes pgvector embeddings — must re-seed.

    - id: SEC-03
      title: Set COOKIE_SECURE=1 behind HTTPS
      detail: >
        Currently 0 (plain HTTP, local dev). Set to 1 once TLS is in place.
        Required for cookie-based JWT auth to be secure.

    - id: SEC-04
      title: Restrict CORS_ORIGINS
      detail: >
        Currently "*". Set to the actual frontend origin once deployed behind a
        domain (e.g. "https://kiosk.yourdomain.org").

    - id: SEC-05
      title: Move Twilio credentials to secrets manager or env injection
      detail: >
        Currently in plaintext .env on the Pi filesystem.
        For production: use Docker secrets, Vault, or at minimum chmod 600 .env
        and ensure it's owned by the operator user only.
        chmod 600 /home/operator/talkbox/pointer-fork/.env

    - id: SEC-06
      title: TLS / HTTPS for the kiosk
      detail: >
        Currently plain HTTP on port 8084 (loopback-only backend on 8085).
        Options:
          A) Tailscale HTTPS (easiest — installs in 5 min, provides cert for Pi)
          B) Caddy reverse proxy (port 443 → 8084, auto-cert via Let's Encrypt)
          C) Cloudflare Tunnel (free, no port forwarding needed)
        Required before COOKIE_SECURE=1 can be set.

    - id: SEC-07
      title: Replace free ephemeral tunnel with static domain or Cloudflare Tunnel
      detail: >
        Free Tailscale Funnel = random URL on every reboot. twilio-sync.sh works around
        this but is fragile. Options:
          A) static public domain: set once in .env + Twilio Console, done.
          B) Cloudflare Tunnel: free, static hostname, no NAT piercing needed.
             Install: curl -L https://pkg.cloudflare.com/cloudflare-main.gpg | ... 
             Then: cloudflared tunnel create talkbox
                   cloudflared tunnel route dns talkbox call.yourdomain.com
             Set TWILIO_PUBLIC_URL=https://call.yourdomain.com in .env.
             Create systemd unit for cloudflared (replaces twilio-sync.sh).

    - id: SEC-08
      title: Twilio webhook signature validation
      detail: >
        Currently the /api/kiosk/call/twiml and /call/status endpoints do NOT
        validate the X-Twilio-Signature header. Any internet client can POST to
        them if they know the public URL.
        Fix: add Twilio signature validation middleware to kiosk_routes.py.
        Library: twilio.request_validator.RequestValidator
        Validate: validator.validate(url, post_data, signature)
        Return 403 if invalid.

    - id: SEC-09
      title: Pending call store — move to Redis or Postgres
      detail: >
        Currently _pending_calls is an in-memory dict in kiosk_routes.py.
        It is lost on backend restart and does not scale to multiple workers.
        For production: store in Redis (already a common Docker sidecar) or
        a postgres table with TTL cleanup via pg_cron or a background task.

    - id: SEC-10
      title: Rate limiting on call/token endpoint
      detail: >
        Currently no rate limiting. A malicious client could hammer /api/kiosk/call/token
        trying to probe the allowlist.
        Fix: add SlowAPI or fastapi-limiter (Redis-backed) to kiosk_routes.py.
        Suggested limit: 5 requests / 60 seconds per IP.

  priority_operational:
    - id: OPS-01
      title: Watchdog for Docker stack
      detail: >
        If pointer-backend crashes (OOM, unhandled exception), it will restart
        (restart: unless-stopped in compose), but the public tunnel still points
        to the old process. Add a systemd watchdog or health-check cron that
        verifies curl http://localhost:8085/api/health responds within 10s,
        and if not, runs: docker compose -f /home/operator/talkbox/pointer-fork/docker-compose.yml restart pointer-backend

    - id: OPS-02
      title: Persistent call event logging
      detail: >
        /api/kiosk/call/status currently only logs to stdout (captured by Docker).
        Events should be written to a DB table (kiosk_events) for analytics:
        who called what, call duration, success/failure rates.
        Schema is already partially defined in the alembic migrations dir.

    - id: OPS-03
      title: USB microphone auto-detection
      detail: >
        The Pi requires a USB microphone for two-way calls. If it's unplugged,
        the browser will silently fail or prompt for permissions.
        Add a startup check in the frontend that calls navigator.mediaDevices.getUserMedia()
        on load and shows a "Microphone not found" banner in the status bar if it fails.

    - id: OPS-04
      title: Chromium kiosk — disable sleep/blanking
      detail: >
        Pi LXDE will blank the screen after inactivity. For a public kiosk:
        Add to ~/.config/autostart/kiosk.desktop (or a separate autostart entry):
          xset s off
          xset -dpms
          xset s noblank
        Or create /etc/X11/xorg.conf.d/10-blanking.conf.

    - id: OPS-05
      title: Auto-update mechanism
      detail: >
        Currently the Pi must be manually SSH'd to pull + rebuild.
        Options:
          A) Watchtower Docker container (polls GHCR for new image tags, auto-pulls)
          B) GitHub Actions CI → builds + pushes to GHCR on every push to main →
             Watchtower on Pi detects new tag, pulls, restarts.
          C) Simple cron: 0 3 * * * cd /home/operator/talkbox && git pull --rebase && docker compose up -d --build
        Option B is recommended long-term (proper CD pipeline).

    - id: OPS-06
      title: Log rotation
      detail: >
        Docker logs are unlimited by default. Add to pointer-fork/docker-compose.yml
        under each service:
          logging:
            driver: json-file
            options:
              max-size: "10m"
              max-file: "3"

  priority_nice_to_have:
    - id: FEAT-01
      title: Replace Tailscale Funnel with production Twilio webhook
      detail: >
        Long-term: deploy backend to a cloud VM or container service with a static
        IP/domain. Set TWILIO_PUBLIC_URL to that domain. Eliminate tunnel churn entirely.
        ephemeral tunnel URLs are a development/demo workaround.

    - id: FEAT-02
      title: Physical button mapping
      detail: >
        The UI "Call" (green) and "End call" (red) buttons are currently rendered
        in the browser and clicked with a touchscreen.
        The hardware plan is to wire physical arcade-style buttons to the Pi GPIO.
        Map: GPIO button press → keyboard event injection via udev/xdotool →
        browser receives keypress → state machine handles it.
        Note: "End call" button uses a dedicated onHangUp callback (NOT a keypress),
        so GPIO should either: (a) inject a DOM click event on the button element,
        or (b) use a custom JS event listener added to useKioskVoiceCall.

    - id: FEAT-03
      title: Accessibility / TTS
      detail: >
        TTS (text-to-speech) is partially implemented via browser speechSynthesis
        in pointer-fork/frontend/src/lib/tts.js. Not all screens have TTS prompts.
        Full accessibility pass needed before public deployment.

    - id: FEAT-04
      title: Agencies database — Sacramento county data
      detail: >
        The pgvector database is seeded from pointer-fork/database/sacramento.db
        (SQLite, mounted read-only into the backend container).
        This is the allowlist for real calls — only agencies in this DB can be
        dialed (outside of KIOSK_TEST_CALL_NUMBERS).
        Current state: partially populated. Needs full Sacramento county 211 data.
        Migration script: pointer-fork/scripts/rebuild_healthscout_db.py

