  env_schema: pointer-fork/.env.example                                # committed schema/template
  docker_compose: pointer-fork/docker-compose.yml                      # main orchestration
  root_compose: docker-compose.yml                                      # thin wrapper (name: pointer-fork)

  backend:
    entrypoint: pointer-fork/backend/docker-entrypoint.sh              # migrations + seed + uvicorn
    main: pointer-fork/backend/main.py
    api_router: pointer-fork/backend/src/presentation/api.py
    kiosk_routes: pointer-fork/backend/src/presentation/kiosk_routes.py   # all /api/kiosk/* endpoints
    config: pointer-fork/backend/src/infrastructure/config.py          # pydantic settings (reads .env)
    voice_service: pointer-fork/backend/src/infrastructure/voice/twilio_voice_service.py
    call_service: pointer-fork/backend/src/application/services/kiosk_call_service.py  # allowlist logic
    alembic_versions: pointer-fork/backend/alembic/versions/           # DB migrations

  frontend:
    entry: pointer-fork/frontend/src/main.jsx
    kiosk_page: pointer-fork/frontend/src/pages/KioskPage.jsx
    kiosk_shell: pointer-fork/frontend/src/components/kiosk/KioskShell.jsx   # screen router
    state_machine: pointer-fork/frontend/src/hooks/useKioskStateMachine.js   # all UX state
    voice_hook: pointer-fork/frontend/src/hooks/useKioskVoiceCall.js         # Twilio Device lifecycle
    api_client: pointer-fork/frontend/src/lib/kioskApi.js                    # all backend API calls
    call_screen: pointer-fork/frontend/src/components/kiosk/KioskCallScreen.jsx
    dialpad: pointer-fork/frontend/src/components/kiosk/KioskDialPad.jsx
