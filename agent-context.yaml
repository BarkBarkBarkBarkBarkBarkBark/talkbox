################################################################################
# QUICKSTART FOR NEW DEV/AGENT
################################################################################

quickstart:
  ssh_into_pi: ssh operator@hosaka   # password: neuro
  check_stack: |
    docker ps
    curl -fsS http://localhost:8085/api/health
    curl -fsS http://localhost:8084/ -o /dev/null -w 'frontend HTTP %{http_code}'

  pull_latest_and_rebuild: |
    cd /home/operator/talkbox
    git fetch origin && git reset --hard origin/main
    cd pointer-fork
    docker compose up -d --build pointer-backend pointer-frontend

  restart_twilio_sync_service: |
    sudo systemctl restart twilio-sync.service
    journalctl -u twilio-sync.service -f   # watch for "Done. Talk Box is ready for calls."

  view_public_url: |
    grep '^TWILIO_PUBLIC_URL=' /home/operator/talkbox/app/.env

  test_call_token_api: |
    # From the Pi, test the allowlist + token endpoint directly:
    curl -s -X POST http://localhost:8085/api/kiosk/call/token \
      -H 'Content-Type: application/json' \
      -d '{"phone":"+17076376544","name":"test"}' | python3 -m json.tool
    # Expected: {"token":"...", "identity":"...", "agency":"..."}
    # 403 = number not allowlisted
    # 503 = TWILIO_TWIML_APP_SID or TWILIO_PUBLIC_URL not set in .env

  edit_env: nano /home/operator/talkbox/pointer-fork/.env

  first_hardening_steps:
    1: "openssl rand -hex 32  # copy output → JWT_SECRET in .env"
    2: "nano /home/operator/talkbox/pointer-fork/.env  # set JWT_SECRET, ADMIN_PASSWORD, COOKIE_SECURE"
    3: "chmod 600 /home/operator/talkbox/pointer-fork/.env"
    4: "docker compose -f /home/operator/talkbox/pointer-fork/docker-compose.yml restart pointer-backend"
    5: "Implement SEC-08 (Twilio signature validation) — see kiosk_routes.py"
    6: "Set up Cloudflare Tunnel or Tailscale Funnel paid (SEC-07) to replace random public URL"
    7: "Implement OPS-06 (log rotation) — add logging block to docker-compose.yml"
