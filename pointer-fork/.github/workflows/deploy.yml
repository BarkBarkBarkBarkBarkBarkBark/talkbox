name: CI/CD — Pointer

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip image build — redeploy existing tags"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/la-plas-growth/pointer

jobs:
  build-and-publish:
    name: Build ${{ matrix.service }} image
    if: ${{ github.event.inputs.skip_build != 'true' }}
    runs-on:
      group: Oracle
    environment: production
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            target: api
            build_args: ""
          - service: frontend
            context: ./frontend
            target: ""
            build_args: |
              VITE_API_URL=${{ vars.VITE_API_URL }}
              VITE_APP_NAME=${{ vars.VITE_APP_NAME }}
              VITE_DISABLE_AUTH=${{ vars.VITE_DISABLE_AUTH }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to production
    needs: build-and-publish
    if: ${{ always() && (needs.build-and-publish.result == 'success' || needs.build-and-publish.result == 'skipped') }}
    runs-on:
      group: Oracle
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_DIR: /opt/pointer
      IMAGE_BACKEND: ghcr.io/la-plas-growth/pointer-backend:${{ github.ref_name }}
      IMAGE_FRONTEND: ghcr.io/la-plas-growth/pointer-frontend:${{ github.ref_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish compose manifests and seed data to host
        run: |
          sudo mkdir -p "${DEPLOY_DIR}/nginx" "${DEPLOY_DIR}/database"
          sudo cp docker-compose.yml "${DEPLOY_DIR}/docker-compose.yml"
          sudo cp nginx/default.conf "${DEPLOY_DIR}/nginx/default.conf"
          sudo cp database/sacramento.db "${DEPLOY_DIR}/database/sacramento.db"

      - name: Render production environment file
        env:
          # Secrets
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_URI: ${{ secrets.DB_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          # Variables
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          MODEL: ${{ vars.MODEL }}
          MODEL_TEMPERATURE: ${{ vars.MODEL_TEMPERATURE }}
          EMBEDDINGS_PROVIDER: ${{ vars.EMBEDDINGS_PROVIDER }}
          EMBEDDINGS_MODEL: ${{ vars.EMBEDDINGS_MODEL }}
          COLLECTION_NAME: ${{ vars.COLLECTION_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_TABLE_NAME: ${{ vars.DB_TABLE_NAME }}
          LOG_FILE: ${{ vars.LOG_FILE }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          COOKIE_SECURE: ${{ vars.COOKIE_SECURE }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
          ADMIN_NAME: ${{ vars.ADMIN_NAME }}
          ADMIN_COMPANY: ${{ vars.ADMIN_COMPANY }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
          DISABLE_AUTH: ${{ vars.DISABLE_AUTH }}
        run: |
          tmp=$(mktemp)
          {
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'LLM_PROVIDER=%s\n' "$LLM_PROVIDER"
            printf 'MODEL=%s\n' "$MODEL"
            printf 'MODEL_TEMPERATURE=%s\n' "$MODEL_TEMPERATURE"
            printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            printf 'EMBEDDINGS_PROVIDER=%s\n' "$EMBEDDINGS_PROVIDER"
            printf 'EMBEDDINGS_MODEL=%s\n' "$EMBEDDINGS_MODEL"
            printf 'COLLECTION_NAME=%s\n' "$COLLECTION_NAME"
            printf 'AWS_REGION=%s\n' "$AWS_REGION"
            printf 'AWS_ACCESS_KEY_ID=%s\n' "$AWS_ACCESS_KEY_ID"
            printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$AWS_SECRET_ACCESS_KEY"
            printf 'DB_URI=%s\n' "$DB_URI"
            printf 'DB_NAME=%s\n' "$DB_NAME"
            printf 'DB_TABLE_NAME=%s\n' "$DB_TABLE_NAME"
            printf 'LOG_FILE=%s\n' "$LOG_FILE"
            printf 'LOG_LEVEL=%s\n' "$LOG_LEVEL"
            printf 'CORS_ORIGINS=%s\n' "$CORS_ORIGINS"
            printf 'COOKIE_SECURE=%s\n' "$COOKIE_SECURE"
            printf 'FRONTEND_URL=%s\n' "$FRONTEND_URL"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'ADMIN_EMAIL=%s\n' "$ADMIN_EMAIL"
            printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD"
            printf 'ADMIN_NAME=%s\n' "$ADMIN_NAME"
            printf 'ADMIN_COMPANY=%s\n' "$ADMIN_COMPANY"
            printf 'TWILIO_ACCOUNT_SID=%s\n' "$TWILIO_ACCOUNT_SID"
            printf 'TWILIO_AUTH_TOKEN=%s\n' "$TWILIO_AUTH_TOKEN"
            printf 'TWILIO_PHONE_NUMBER=%s\n' "$TWILIO_PHONE_NUMBER"
            printf 'VITE_API_URL=%s\n' "$VITE_API_URL"
            printf 'VITE_APP_NAME=%s\n' "$VITE_APP_NAME"
            printf 'DISABLE_AUTH=%s\n' "$DISABLE_AUTH"
            printf 'IMAGE_BACKEND=%s\n' "$IMAGE_BACKEND"
            printf 'IMAGE_FRONTEND=%s\n' "$IMAGE_FRONTEND"
          } > "$tmp"
          sudo install -m 600 -o root -g root "$tmp" "${DEPLOY_DIR}/.env"
          rm -f "$tmp"

      - name: Pull images and roll out services
        working-directory: /opt/pointer
        run: |
          sudo -E docker compose pull
          sudo -E docker compose up -d --remove-orphans

      - name: Prune stale docker images
        run: sudo docker image prune -f

      - name: Clean up runner workspace
        if: always()
        run: |
          docker logout "${REGISTRY}" || true
          rm -rf "${GITHUB_WORKSPACE}/"* "${GITHUB_WORKSPACE}/".[!.]* || true
