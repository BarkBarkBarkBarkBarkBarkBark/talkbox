services:
  pointer-postgres:
    container_name: pointer-postgres
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pointer}
      POSTGRES_USER: ${POSTGRES_USER:-pointer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pointer} -d ${POSTGRES_DB:-pointer}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - pointer-network

  pointer-backend:
    container_name: pointer-backend
    image: ${IMAGE_BACKEND:-ghcr.io/la-plas-growth/pointer-backend:latest}
    build:
      context: ./backend
      target: api
    ports:
      # Loopback-only: host tooling can hit the API directly at 127.0.0.1:8085
      # while external traffic keeps flowing through nginx on the frontend.
      - "127.0.0.1:8085:8000"
    env_file: .env
    volumes:
      - backend-data:/data
      - ./database/sacramento.db:/data/sacramento.db:ro
    depends_on:
      pointer-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - pointer-network

  pointer-frontend:
    container_name: pointer-frontend
    image: ${IMAGE_FRONTEND:-ghcr.io/la-plas-growth/pointer-frontend:latest}
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_APP_NAME=${VITE_APP_NAME:-Pointer AI}
    ports:
      - "127.0.0.1:8084:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      pointer-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - pointer-network

networks:
  pointer-network:
    name: pointer-network

volumes:
  postgres-data:
    name: pointer-postgres-data
  backend-data:
    name: pointer-backend-data
